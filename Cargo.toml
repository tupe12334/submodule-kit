[package]
name = "submodule-kit"
version = "0.2.2"
edition = "2024"
authors = ["tupe12334 <ofek.gabay.he@gmail.com>"]
description = "A CLI toolkit for managing git submodules"
repository = "https://github.com/tupe12334/submodule-kit"
readme = "README.md"
license = "MIT"
keywords = ["git", "submodule", "cli"]
categories = ["command-line-utilities", "development-tools"]

[lints.clippy]
all = "deny"
# Forbid `.unwrap()` in production code: an unexpected `None`/`Err` should surface
# as a handled, user-facing error rather than crashing the CLI with an opaque panic.
unwrap_used = "deny"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap-markdown = "0.1"
git2 = "0.20"

[dev-dependencies]
tempfile = "3"
